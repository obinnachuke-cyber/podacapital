<!DOCTYPE html>
<html>
<head>
  <title>poda capital</title>
  <style>
    body {
      background: white;
      color: black;
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 6px;
      letter-spacing: -1px;
    }

    .sub {
      color: #666;
      margin-bottom: 40px;
    }

    .nav {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
    }

    .nav button {
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      transition: 0.2s;
    }

    /* ACTIVE BUTTON STYLE */
    .nav button.active {
      background: #2d1746;
      color: white;
      border-color: #2d1746;
    }

    .nav button:hover {
      border-color: #2d1746;
      color: #2d1746;
    }

    .section {
      display: none;
    }

    .show {
      display: block;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #2d1746;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>poda capital</h1>
  <div class="sub">An open system of cultural capital.</div>

  <div class="nav">
    <button class="active" onclick="show(event, 'newsletter')">Newsletter</button>
    <button onclick="show(event, 'closet')">Closet</button>
    <button onclick="show(event, 'listed')">Listed</button>
    <button onclick="show(event, 'sold')">Sold</button>
  </div>

  <div id="newsletter" class="section show">
    <div class="card">
      <div class="label">Newsletter</div>
      <h2>Investor memos on culture</h2>
      <p>This will connect to your Substack.</p>
    </div>
  </div>

  <div id="closet" class="section">
    <div class="label">Closet</div>
    <div class="grid">
      <div class="card">Maison Margiela Piece</div>
      <div class="card">BAPE Hoodie</div>
    </div>
  </div>

  <div id="listed" class="section">
    <div class="label">Listed</div>
    <div class="grid">
      <div class="card">Supreme Jacket (Live)</div>
      <div class="card">Margiela Pants (Live)</div>
    </div>
  </div>

  <div id="sold" class="section">
    <div class="label">Sold</div>
    <div class="grid">
      <div class="card">Supreme Tee — Sold</div>
      <div class="card">Margiela Shoes — Sold</div>
    </div>
  </div>

</div>

<script>
function show(event, id) {
  // hide all sections
  document.querySelectorAll('.section').forEach(el => el.classList.remove('show'));

  // show selected section
  document.getElementById(id).classList.add('show');

  // remove active from all buttons
  document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));

  // add active to clicked button
  event.target.classList.add('active');
}
</script>

</body>
</html>
